name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libboost-all-dev \
            libcap-dev \
            libdrm-dev \
            libevdev-dev \
            libnuma-dev \
            libopus-dev \
            libpulse-dev \
            libssl-dev \
            libva-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxfixes-dev \
            nlohmann-json3-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build/tests --output-on-failure
